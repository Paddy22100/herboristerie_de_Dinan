                    </div>
                </div>
                
                <!-- Navigation -->
                <nav class="space-y-1">

                    </a>

                        <span>Articles</span>
                    </a>

                            <span>Statistiques</span>
                        </a>

                </nav>
                
                <!-- Logout -->

                        <i data-lucide="log-out" class="w-4 h-4"></i>
                        <span>Déconnexion</span>
                    </button>
                </div>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="flex-1 overflow-x-auto">
            <!-- Header -->
            <header class="bg-white shadow-sm border-b border-sage/20">
                <div class="px-6 py-4 flex items-center justify-between">
                    <div>
                        <h2 class="text-2xl font-bold text-forest">Gestion des produits</h2>
                        <p class="text-sm text-soft-gray">Ajoutez, modifiez ou supprimez vos produits</p>
                    </div>
                    <button id="addProductBtn" class="bg-forest text-natural px-4 py-2 rounded-lg hover:bg-leaf transition-colors flex items-center gap-2">
                        <i data-lucide="plus" class="w-4 h-4"></i>
                        <span>Ajouter un produit</span>
                    </button>
                </div>
            </header>
            
            <!-- Products Content -->
            <div class="p-6">
                <!-- Filters -->
                <div class="bg-white rounded-xl p-4 shadow-lg mb-6">
                    <div class="flex flex-wrap gap-4 items-center">
                        <div class="flex-1 min-w-64">
                            <input type="text" id="searchInput" placeholder="Rechercher un produit..." 
                                   class="w-full px-4 py-2 border border-sage/30 rounded-lg focus:outline-none focus:ring-2 focus:ring-forest">
                        </div>
                        <select id="categoryFilter" class="px-4 py-2 border border-sage/30 rounded-lg focus:outline-none focus:ring-2 focus:ring-forest">
                            <option value="">Toutes les catégories</option>
                            <option value="tisanes">Tisanes</option>
                            <option value="plantes">Plantes médicinales</option>
                            <option value="complements">Compléments alimentaires</option>
                            <option value="bienetre">Produits bien-être</option>
                        </select>
                        <select id="statusFilter" class="px-4 py-2 border border-sage/30 rounded-lg focus:outline-none focus:ring-2 focus:ring-forest">
                            <option value="">Tous les statuts</option>
                            <option value="active">Actif</option>
                            <option value="inactive">Inactif</option>
                            <option value="outofstock">Rupture</option>
                        </select>
                    </div>
                </div>
                
                <!-- Products Table -->
                <div class="bg-white rounded-xl shadow-lg overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead class="bg-sage/10">
                                <tr>
                                    <th class="text-left py-3 px-4 text-sm font-medium text-forest">Produit</th>
                                    <th class="text-left py-3 px-4 text-sm font-medium text-forest">Catégorie</th>
                                    <th class="text-left py-3 px-4 text-sm font-medium text-forest">Prix</th>
                                    <th class="text-left py-3 px-4 text-sm font-medium text-forest">Stock</th>
                                    <th class="text-left py-3 px-4 text-sm font-medium text-forest">Statut</th>
                                    <th class="text-left py-3 px-4 text-sm font-medium text-forest">Actions</th>
                                </tr>
                            </thead>

                                <!-- Products will be loaded here -->
                            </tbody>

    <!-- Product Modal -->
    <div id="productModal" class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 hidden z-50">
        <div class="bg-white rounded-2xl p-6 max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xl font-bold text-forest" id="modalTitle">Ajouter un produit</h3>
                <button id="closeModal" class="text-soft-gray hover:text-forest">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            
            <form id="productForm" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-forest mb-2">Nom du produit *</label>
                        <input type="text" id="productName" required 
                               class="w-full px-4 py-2 border border-sage/30 rounded-lg focus:outline-none focus:ring-2 focus:ring-forest">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-forest mb-2">Catégorie *</label>
                        <select id="productCategory" required 
                                class="w-full px-4 py-2 border border-sage/30 rounded-lg focus:outline-none focus:ring-2 focus:ring-forest">
                            <option value="">Sélectionner une catégorie</option>
                            <option value="tisanes">Tisanes</option>
                            <option value="plantes">Plantes médicinales</option>
                            <option value="complements">Compléments alimentaires</option>
                            <option value="bienetre">Produits bien-être</option>
                        </select>
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-forest mb-2">Description *</label>
                    <textarea id="productDescription" rows="3" required
                              class="w-full px-4 py-2 border border-sage/30 rounded-lg focus:outline-none focus:ring-2 focus:ring-forest"></textarea>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-forest mb-2">Prix (€) *</label>
                        <input type="number" id="productPrice" step="0.01" min="0" required
                               class="w-full px-4 py-2 border border-sage/30 rounded-lg focus:outline-none focus:ring-2 focus:ring-forest">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-forest mb-2">Stock *</label>
                        <input type="number" id="productStock" min="0" required
                               class="w-full px-4 py-2 border border-sage/30 rounded-lg focus:outline-none focus:ring-2 focus:ring-forest">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-forest mb-2">Statut</label>
                        <select id="productStatus" 
                                class="w-full px-4 py-2 border border-sage/30 rounded-lg focus:outline-none focus:ring-2 focus:ring-forest">
                            <option value="active">Actif</option>
                            <option value="inactive">Inactif</option>
                            <option value="outofstock">Rupture</option>
                        </select>
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-forest mb-2">Image URL</label>
                    <input type="url" id="productImage" placeholder="https://example.com/image.jpg"
                           class="w-full px-4 py-2 border border-sage/30 rounded-lg focus:outline-none focus:ring-2 focus:ring-forest">
                </div>
                
                <div class="flex justify-end gap-4">
                    <button type="button" id="cancelBtn" 
                            class="px-6 py-2 border border-sage/30 rounded-lg hover:bg-sage/10 transition-colors">
                        Annuler
                    </button>
                    <button type="submit" 
                            class="bg-forest text-natural px-6 py-2 rounded-lg hover:bg-leaf transition-colors">
                        Enregistrer
                    </button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

            {

                category: 'complements',
                description: 'Souches probiotiques pour l\'équilibre intestinal. 30 milliards d\'UFC par gélule. 60 gélules.',
                price: 32.90,
                stock: 0,

            {

                name: 'Sérum Visage Hydratant',
                category: 'bienetre',
                description: 'Sérum visage à l\'hydrolat de rose et acide hyaluronique. Pour une peau hydratée et éclatante. 30ml.',
                price: 22.90,
                stock: 1,
                status: 'active',
                image: 'https://via.placeholder.com/40x40/E6A5A5/FFFFFF?text=SER',
                sku: 'SER-012',
                supplier: 'Distillerie Dinannaise',
                weight: '30ml'
            }
        ];
        
        // Save products to localStorage for dashboard sync
        function saveProductsToStorage() {
            localStorage.setItem('products', JSON.stringify(products));
        }
        
        // Set user email from session
        const userEmail = sessionStorage.getItem('adminEmail');
        if (userEmail) {
            const userEmailElement = document.getElementById('userEmail');
            if (userEmailElement) {
                userEmailElement.textContent = userEmail;
            }
        }
        
        // Logout functionality
        document.getElementById('logoutBtn').addEventListener('click', () => {
            sessionStorage.removeItem('adminAuthenticated');
            sessionStorage.removeItem('adminEmail');
            window.location.href = '../index.html'; // Return to main site homepage
        });
        
        // Render products table
        function renderProducts(filteredProducts = products) {
            const tbody = document.getElementById('productsTableBody');
            tbody.innerHTML = '';
            
            filteredProducts.forEach(product => {
                const row = document.createElement('tr');
                row.className = 'border-b border-sage/10 hover:bg-sage/5';
                
                const statusClass = {
                    active: 'bg-leaf/10 text-leaf',
                    inactive: 'bg-soft-gray/10 text-soft-gray',
                    outofstock: 'bg-flower/10 text-flower'
                }[product.status];
                
                const statusText = {
                    active: 'Actif',
                    inactive: 'Inactif',
                    outofstock: 'Rupture'
                }[product.status];
                
                const stockClass = product.stock <= 10 ? 'text-flower' : 'text-forest';
                
                row.innerHTML = `
                    <td class="py-3 px-4">
                        <div class="flex items-center gap-3">
                            <img src="${product.image || 'https://via.placeholder.com/40x40'}" 
                                 alt="${product.name}" class="w-10 h-10 rounded-lg object-cover">
                            <div>
                                <p class="font-medium text-forest">${product.name}</p>
                                <p class="text-xs text-soft-gray">${product.description.substring(0, 50)}...</p>
                            </div>
                        </div>
                    </td>
                    <td class="py-3 px-4">
                        <span class="inline-flex items-center px-2 py-1 rounded-full text-xs font-medium bg-sage/10 text-sage">
                            ${product.category}
                        </span>
                    </td>
                    <td class="py-3 px-4 font-medium text-forest">€${product.price.toFixed(2)}</td>
                    <td class="py-3 px-4">
                        <span class="${stockClass} font-medium">${product.stock}</span>
                    </td>
                    <td class="py-3 px-4">
                        <span class="inline-flex items-center px-2 py-1 rounded-full text-xs font-medium ${statusClass}">
                            ${statusText}
                        </span>
                    </td>
                    <td class="py-3 px-4">
                        <div class="flex gap-2">
                            <button onclick="editProduct(${product.id})" 
                                    class="p-1 text-sage hover:text-forest">
                                <i data-lucide="edit" class="w-4 h-4"></i>
                            </button>
                            <button onclick="deleteProduct(${product.id})" 
                                    class="p-1 text-flower hover:text-red-600">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </td>
                `;
                
                tbody.appendChild(row);
            });
            
            // Re-initialize icons
            lucide.createIcons();
        }
        
        // Modal functionality
        const modal = document.getElementById('productModal');
        const modalTitle = document.getElementById('modalTitle');
        const productForm = document.getElementById('productForm');
        let editingProductId = null;
        
        document.getElementById('addProductBtn').addEventListener('click', () => {
            editingProductId = null;
            modalTitle.textContent = 'Ajouter un produit';
            productForm.reset();
            modal.classList.remove('hidden');
        });
        
        document.getElementById('closeModal').addEventListener('click', () => {
            modal.classList.add('hidden');
        });
        
        document.getElementById('cancelBtn').addEventListener('click', () => {
            modal.classList.add('hidden');
        });
        
        // Form submission
        productForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const productData = {
                name: document.getElementById('productName').value,
                category: document.getElementById('productCategory').value,
                description: document.getElementById('productDescription').value,
                price: parseFloat(document.getElementById('productPrice').value),
                stock: parseInt(document.getElementById('productStock').value),
                status: document.getElementById('productStatus').value,
                image: document.getElementById('productImage').value,
                sku: 'PRD-' + Date.now(),
                supplier: 'Producteurs Bretons',
                weight: '50g'
            };
            
            if (editingProductId) {
                // Update existing product
                const index = products.findIndex(p => p.id === editingProductId);
                products[index] = { ...products[index], ...productData };
            } else {
                // Add new product
                productData.id = Date.now();
                products.push(productData);
            }
            
            // Save to localStorage
            saveProductsToStorage();
            
            renderProducts();
            modal.classList.add('hidden');
            productForm.reset();
        });
        
        // Edit product
        function editProduct(id) {
            const product = products.find(p => p.id === id);
            if (!product) return;
            
            editingProductId = id;
            modalTitle.textContent = 'Modifier le produit';
            
            document.getElementById('productName').value = product.name;
            document.getElementById('productCategory').value = product.category;
            document.getElementById('productDescription').value = product.description;
            document.getElementById('productPrice').value = product.price;
            document.getElementById('productStock').value = product.stock;
            document.getElementById('productStatus').value = product.status;
            document.getElementById('productImage').value = product.image || '';
            
            modal.classList.remove('hidden');
        }
        
        // Delete product
        function deleteProduct(id) {
            if (confirm('Êtes-vous sûr de vouloir supprimer ce produit ?')) {
                products = products.filter(p => p.id !== id);
                saveProductsToStorage();
                renderProducts();
            }
        }
        
        // Filter functionality
        document.getElementById('searchInput').addEventListener('input', filterProducts);
        document.getElementById('categoryFilter').addEventListener('change', filterProducts);
        document.getElementById('statusFilter').addEventListener('change', filterProducts);
        
        function filterProducts() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const categoryFilter = document.getElementById('categoryFilter').value;
            const statusFilter = document.getElementById('statusFilter').value;
            
            const filtered = products.filter(product => {
                const matchesSearch = product.name.toLowerCase().includes(searchTerm) || 
                                   product.description.toLowerCase().includes(searchTerm);
                const matchesCategory = !categoryFilter || product.category === categoryFilter;
                const matchesStatus = !statusFilter || product.status === statusFilter;
                
                return matchesSearch && matchesCategory && matchesStatus;
            });
            
            renderProducts(filtered);
        }
        
        // Initial render
        renderProducts();
        
        // Save products to localStorage for boutique sync
        saveProductsToStorage();
        
        // Sync badges with dashboard
        function syncBadges() {
            const productsData = JSON.parse(localStorage.getItem('products') || '[]');
            const stockData = JSON.parse(localStorage.getItem('stock') || '[]');
            const ordersData = JSON.parse(localStorage.getItem('orders') || '[]');
            
            // Update badges
            const productsBadge = document.getElementById('productsBadge');
            const stockBadge = document.getElementById('stockBadge');
            const ordersBadge = document.getElementById('ordersBadge');
            
            if (productsBadge) productsBadge.textContent = productsData.length;
            if (stockBadge) stockBadge.textContent = stockData.filter(s => s.currentStock <= s.alertThreshold).length;
            if (ordersBadge) ordersBadge.textContent = ordersData.length;
        }
        
        // Initial sync
        syncBadges();
        
        // Auto-sync every 30 seconds
        setInterval(syncBadges, 30000);
    </script>
</body>
</html>
